# Grafana Dashboard Provisioning

apiVersion: 1

providers:
  - name: 'UNS Platform Dashboards'
    orgId: 1
    folder: 'UNS Platform'
    folderUid: 'uns-platform'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
