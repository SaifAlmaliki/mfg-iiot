# Mosquitto MQTT Broker Configuration
# For UNS Manufacturing Platform

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Authentication (allow anonymous for development - change for production!)
allow_anonymous true

# MQTT TCP Listener
listener 1883
protocol mqtt

# WebSocket Listener (for browser clients)
listener 9001
protocol websockets

# Connection limits
max_connections -1
max_queued_messages 1000
