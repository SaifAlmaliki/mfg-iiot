# UNS Manufacturing Platform - Complete Docker Compose
# All services needed for the full platform
# Usage: docker compose up -d

services:
  # ===========================================
  # CORE APPLICATION
  # ===========================================
  
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uns-platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      emqx:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://uns_user:uns_password@postgres:5432/uns_manufacturing?schema=public
      
      # NextAuth (host port 3080 when using Docker; override with NEXTAUTH_URL if needed)
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3080}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-uns-platform-secret-change-in-production}
      
      # InfluxDB
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: uns-platform-super-secret-token
      INFLUXDB_ORG: uns-platform
      INFLUXDB_BUCKET: manufacturing
      
      # MQTT (EMQX)
      MQTT_BROKER_URL: mqtt://emqx:1883
      MQTT_WS_URL: ws://localhost:8083/mqtt
      EMQX_CLIENT_ID: uns-platform-app
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Application
      NODE_ENV: production
      SOCKET_IO_PORT: 3001
    ports:
      - "3080:3000"
      - "3081:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - uns-network

  # ===========================================
  # DATABASE LAYER
  # ===========================================
  
  postgres:
    image: postgres:16-alpine
    container_name: uns-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uns_user
      POSTGRES_PASSWORD: uns_password
      POSTGRES_DB: uns_manufacturing
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uns_user -d uns_manufacturing"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uns-network

  redis:
    image: redis:7-alpine
    container_name: uns-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uns-network

  # ===========================================
  # TIME SERIES DATABASE
  # ===========================================
  
  influxdb:
    image: influxdb:2.7
    container_name: uns-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: uns-platform
      DOCKER_INFLUXDB_INIT_BUCKET: manufacturing
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: uns-platform-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - uns-network

  # ===========================================
  # MQTT BROKER - EMQX
  # ===========================================
  
  emqx:
    image: emqx/emqx:5.8.0
    container_name: uns-emqx
    restart: unless-stopped
    environment:
      # Node name
      EMQX_NODE_NAME: emqx@0.0.0.0
      
      # Dashboard credentials
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: uns_emqx_2024
      
      # Listeners
      EMQX_LISTENERS__TCP__DEFAULT__BIND: "0.0.0.0:1883"
      EMQX_LISTENERS__WS__DEFAULT__BIND: "0.0.0.0:8083"
      EMQX_LISTENERS__SSL__DEFAULT__BIND: "0.0.0.0:8883"
      
      # MQTT settings
      EMQX_MQTT__MAX_PACKET_SIZE: 1MB
      EMQX_MQTT__MAX_TOPIC_LEVELS: 128
      EMQX_MQTT__RETAIN_AVAILABLE: "true"
      EMQX_MQTT__WILDCARD_SUBSCRIPTION: "true"
      EMQX_MQTT__SHARED_SUBSCRIPTION: "true"
      
      # Rate limiting
      EMQX_LIMITER__CLIENT__BYTES_IN__RATE: 1MB/s
      
      # Authentication (allow anonymous for demo - change in production!)
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__USER_ID_TYPE: username
      
      # ACL
      EMQX_AUTHORIZATION__NO_MATCH: allow
      EMQX_AUTHORIZATION__CACHE__ENABLE: "true"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    ports:
      - "1883:1883"      # MQTT TCP
      - "8083:8083"      # MQTT WebSocket
      - "8883:8883"      # MQTT SSL
      - "18083:18083"    # EMQX Dashboard
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - uns-network

  # ===========================================
  # VISUALIZATION - GRAFANA
  # ===========================================
  
  grafana:
    image: grafana/grafana:11.4.0
    container_name: uns-grafana
    restart: unless-stopped
    depends_on:
      - influxdb
      - postgres
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-influxdb-flux-datasource
      # Provisioning
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - uns-network

  # ===========================================
  # SIMULATORS (Modbus, OPC UA, Energy Meter)
  # Run from repo root: docker compose -f docker/docker-compose.yml up -d
  # ===========================================
  modbus-simulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.modbus
    container_name: uns-modbus-simulator
    restart: unless-stopped
    volumes:
      - ../simulators/simulators.json:/app/config/simulators.json:ro
    ports:
      - "5020:5020"
      - "5030:5030"
      - "5040:5040"
    networks:
      - uns-network

  opcua-simulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.opcua
    container_name: uns-opcua-simulator
    restart: unless-stopped
    volumes:
      - ../simulators/simulators.json:/app/config/simulators.json:ro
    ports:
      - "4840:4840"
      - "4850:4850"
    networks:
      - uns-network

  energymeter-simulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.energymeter
    container_name: uns-energymeter-simulator
    restart: unless-stopped
    volumes:
      - ../simulators/simulators.json:/app/config/simulators.json:ro
    ports:
      - "5010:5010"
      - "5011:5011"
      - "5012:5012"
    networks:
      - uns-network

  # ===========================================
  # ADMIN TOOLS (Optional)
  # ===========================================
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uns-pgadmin
    restart: unless-stopped
    profiles:
      - admin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uns-platform.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:5050"
    depends_on:
      - postgres
    networks:
      - uns-network

# ===========================================
# NETWORKS
# ===========================================
networks:
  uns-network:
    driver: bridge
    name: uns-network

# ===========================================
# VOLUMES
# ===========================================
volumes:
  postgres_data:
    name: uns-postgres-data
  redis_data:
    name: uns-redis-data
  influxdb_data:
    name: uns-influxdb-data
  influxdb_config:
    name: uns-influxdb-config
  emqx_data:
    name: uns-emqx-data
  emqx_log:
    name: uns-emqx-log
  grafana_data:
    name: uns-grafana-data
  pgadmin_data:
    name: uns-pgadmin-data
