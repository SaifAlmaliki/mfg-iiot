# EMQX ACL Configuration
# Access Control List for UNS Platform

# Allow dashboard access
{allow, {username, "admin"}, subscribe, ["#"]}.
{allow, {username, "admin"}, publish, ["#"]}.

# Allow API Gateway service
{allow, {username, "api_gateway"}, subscribe, ["#"]}.
{allow, {username, "api_gateway"}, publish, ["#"]}.

# Allow edge connectors to publish to their site topics
{allow, all, publish, ["Demo-Manufacturing/+/+/+/+/+/value"]}.
{allow, all, publish, ["Demo-Manufacturing/+/+/+/+/+/alarm"]}.
{allow, all, publish, ["Demo-Manufacturing/+/+/+/+/+/status"]}.

# Allow clients to subscribe to topics
{allow, all, subscribe, ["Demo-Manufacturing/#"]}.
{allow, all, subscribe, ["$SYS/#"]}.

# Deny all other access by default
{deny, all}.
