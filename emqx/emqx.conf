# EMQX Configuration for UNS Platform
# MQTT 5.0 Broker Configuration

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 102400
  max_conn_rate = 1000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 102400
  max_conn_rate = 1000
  websocket.mqtt_path = "/mqtt"
}

listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 51200
  ssl_options {
    cacertfile = "/opt/emqx/etc/certs/cacert.pem"
    certfile = "/opt/emqx/etc/certs/cert.pem"
    keyfile = "/opt/emqx/etc/certs/key.pem"
    verify = verify_peer
    fail_if_no_peer_cert = false
  }
}

# MQTT Protocol Settings
mqtt {
  max_packet_size = 1MB
  max_topic_levels = 128
  max_qos_allowed = 2
  max_topic_alias = 65535
  retain_available = true
  wildcard_subscription = true
  shared_subscription = true
  ignore_loop_deliver = false
  strict_mode = false
}

# Zone Settings
zones.default {
  mqtt {
    max_topic_alias = 65535
    max_qos_allowed = 2
  }
  session_expiry_interval = 2h
  max_subscriptions = 0
  max_inflight = 128
  max_awaiting_rel = 100
  max_mqueue_len = 1000
  mqueue_store_qos0 = true
}

# Rate Limiting
limiter.client.bytes_in {
  rate = "1MB/s"
  capacity = "1MB"
}

limiter.client.message_in {
  rate = "10000/s"
  capacity = 10000
}

# Retainer Settings
retainer {
  enable = true
  msg_expiry_interval = 0
  msg_clear_interval = 0
  max_payload_size = 1MB
  stop_publish_clear_msg = false
  delivery_rate = 1000
  max_retained_messages = 100000
}

# Rule Engine for Data Bridge
rule_engine {
  ignore_sys_message = true
  rules {
    rule_1 {
      enable = true
      sql = "SELECT * FROM \"#\""
      actions = ["data_bridge_to_influxdb"]
    }
  }
}

# Bridges (Data Integration)
bridges {
  influxdb {
    influxdb_bridge {
      enable = true
      server = "http://influxdb:8086"
      bucket = "timeseries"
      org = "uns"
      token = "uns_influx_token_2024"
      write_syntax = "${topic},clientid=${clientid} value=${payload.value},quality=${payload.quality} ${timestamp}"
    }
  }
}

# Dashboard
dashboard {
  listeners.http {
    bind = "0.0.0.0:18083"
  }
  default_username = "admin"
  default_password = "uns_admin_2024"
}

# Logging
log {
  console {
    enable = true
    level = info
    time_offset = "system"
  }
  file {
    enable = true
    level = info
    path = "/opt/emqx/log/emqx.log"
    rotation_count = 10
    rotation_size = "50MB"
  }
}
